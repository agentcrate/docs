name: Sync external docs

# Triggered by `repository_dispatch` from upstream repos:
#   - `crate-released` (agentcrate/crate)  — fires sync-cli-docs
#   - `api-released`   (agentcrate/api)    — fires sync-api-docs
#
# Each event carries `client_payload.tag` so the sync script knows which
# release to pull from. The job runs the matching script, commits any
# changes onto a branch, and opens a PR back into `main`.
#
# Manual dispatch is also supported for testing — pick the event and
# optionally pass a tag.

on:
  repository_dispatch:
    types: [crate-released, api-released]
  workflow_dispatch:
    inputs:
      event:
        description: Which sync to run
        type: choice
        required: true
        options:
          - crate-released
          - api-released
      tag:
        description: Release tag (e.g. v0.1.0). Required — empty tags are rejected.
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve event + tag
        id: ctx
        env:
          DISPATCH_EVENT: ${{ github.event.action }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          MANUAL_EVENT: ${{ github.event.inputs.event }}
          MANUAL_TAG: ${{ github.event.inputs.tag }}
        run: |
          event="${DISPATCH_EVENT:-$MANUAL_EVENT}"
          tag="${DISPATCH_TAG:-$MANUAL_TAG}"
          if [ -z "$event" ]; then
            echo "::error::No event resolved — neither repository_dispatch action nor workflow_dispatch input was provided."
            exit 1
          fi
          if [ -z "$tag" ]; then
            echo "::error::No tag resolved for event=$event — refusing to open a PR with an empty version. Pass client_payload.tag (repository_dispatch) or the tag input (workflow_dispatch)."
            exit 1
          fi
          echo "event=$event" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved event=$event tag=$tag"

      - name: Sync CLI docs
        if: steps.ctx.outputs.event == 'crate-released'
        env:
          CRATE_TAG: ${{ steps.ctx.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm sync:cli

      - name: Sync API docs
        if: steps.ctx.outputs.event == 'api-released'
        env:
          API_TAG: ${{ steps.ctx.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm sync:api

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            docs(${{ steps.ctx.outputs.event == 'crate-released' && 'cli' || 'api' }}): sync from ${{ steps.ctx.outputs.tag }}
          title: |
            docs(${{ steps.ctx.outputs.event == 'crate-released' && 'cli' || 'api' }}): sync from ${{ steps.ctx.outputs.tag }}
          body: |
            Auto-generated by `${{ steps.ctx.outputs.event }}` from `${{ steps.ctx.outputs.tag }}`.

            Do not hand-edit `content/docs/cli/` or `content/docs/api/` — both are
            rewritten by the sync scripts on every release.
          branch: sync/${{ steps.ctx.outputs.event }}-${{ steps.ctx.outputs.tag }}
          delete-branch: true
          base: main
